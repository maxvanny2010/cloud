management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

server:
  port: 8080

spring:
  application:
    name: license
  cloud:
    config:
      enabled: true
      uri: http://configserver:8071
  config:
    import: "optional:configserver:http://configserver:8071"
  jpa:
    hibernate:
      # ВАЖНО: validate — Hibernate проверяет что схема совпадает с Entity
      # create/update убраны — схемой управляет Liquibase
      ddl-auto: validate
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

logging:
  level:
    com.netflix: WARN
    org.springframework.web: WARN
    com.license: INFO
