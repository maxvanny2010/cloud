version: '3.7'
services:
  license:
    image: license
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "dev"
      SPRING_CLOUD_CONFIG_URI: http://host.docker.internal:8071
    networks:
      backend:
        aliases:
          - "license"
networks:
  backend:
    driver: bridge