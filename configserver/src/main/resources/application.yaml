spring:
  application:
    name: configserver
  profiles:
    active: native
  cloud:
    config:
      server:
        git:
          order: 2
          uri: ${GIT_CONFIG}
          searchPaths: license
          username: ${USERNAME}
          password: ${TOKEN}
        native:
          search-locations: classpath:/config
server:
  port: 8071
encrypt:
  key: secretkey

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
