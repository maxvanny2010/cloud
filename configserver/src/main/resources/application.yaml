spring:
  application:
    name: configserver
  profiles:
    active:
    - native, git, vault
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
        git:
          uri:  ${GIT_CONFIG}
          searchPaths: license
          username: ${USERNAME}
          password: ${TOKEN}
        vault:
          port: 8200
          host: 127.0.0.1
          kv-version: 2
# create token in GitHub.com
# create repo with properties(no maven or src)
# https://github.com/[username]/[reponame].git
server:
  port: 8071

management:
  endpoints:
    web:
      exposure:
        include: "*"
